name: Build macOS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app (universal binary)
        run: npm run build -- --target universal-apple-darwin
        env:
          # Disable code signing for CI builds.
          # To enable signing, add Apple certificate secrets and set:
          #   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
          #   APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
          TAURI_SIGNING_PRIVATE_KEY: ''
          CI: true

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: Lotus-Teaching-Invoices-app
          path: src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload .dmg installer
        uses: actions/upload-artifact@v4
        with:
          name: Lotus-Teaching-Invoices-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
