name: Build macOS

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Inject tag version into tauri.conf.json
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const cfg = JSON.parse(fs.readFileSync(p, 'utf8'));
            cfg.version = process.env.TAG.replace(/^v/, '');
            fs.writeFileSync(p, JSON.stringify(cfg, null, 2) + '\n');
          "
        env:
          TAG: ${{ github.ref_name }}

      - name: Build Tauri app (universal binary)
        run: bun run build -- --target universal-apple-darwin
        env:
          # Disable code signing for CI builds.
          # To enable signing, add Apple certificate secrets and set:
          #   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
          #   APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
          TAURI_SIGNING_PRIVATE_KEY: ''
          CI: true

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: Lotus-Teaching-Invoices-app
          path: src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload .dmg installer
        uses: actions/upload-artifact@v4
        with:
          name: Lotus-Teaching-Invoices-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download .app bundle
        uses: actions/download-artifact@v4
        with:
          name: Lotus-Teaching-Invoices-app
          path: release-assets/app

      - name: Download .dmg installer
        uses: actions/download-artifact@v4
        with:
          name: Lotus-Teaching-Invoices-dmg
          path: release-assets/dmg

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/dmg/*.dmg
            release-assets/app/*.app
