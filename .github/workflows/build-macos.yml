name: Build macOS

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Inject tag version into tauri.conf.json
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const cfg = JSON.parse(fs.readFileSync(p, 'utf8'));
            const parts = process.env.TAG.replace(/^v/, '').split('.');
            while (parts.length < 3) parts.push('0');
            cfg.version = parts.join('.');
            fs.writeFileSync(p, JSON.stringify(cfg, null, 2) + '\n');
          "
        env:
          TAG: ${{ github.ref_name }}

      - name: Build Tauri app (universal binary)
        run: bun run build -- --target universal-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CI: true

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: Lotus-Teaching-Invoices-app
          path: src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload .dmg installer
        uses: actions/upload-artifact@v4
        with:
          name: Lotus-Teaching-Invoices-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Prepare and publish release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          BUNDLE=src-tauri/target/universal-apple-darwin/release/bundle
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          ASSETS=release-assets
          mkdir -p "$ASSETS"

          # Copy DMG
          cp "$BUNDLE"/dmg/*.dmg "$ASSETS/"

          # Create the .tar.gz from the .app bundle (what the updater needs)
          cd "$BUNDLE/macos"
          tar -czf "Lotus Teaching Invoices.app.tar.gz" "Lotus Teaching Invoices.app"
          cd -

          # Sign the .tar.gz
          # Write key to file to avoid shell/env interpolation issues with -k
          printenv TAURI_SIGNING_PRIVATE_KEY > /tmp/tauri-signing.key
          bunx tauri signer sign \
            --private-key-path /tmp/tauri-signing.key \
            --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$BUNDLE/macos/Lotus Teaching Invoices.app.tar.gz"
          rm -f /tmp/tauri-signing.key

          # Copy signed artifacts
          cp "$BUNDLE/macos/Lotus Teaching Invoices.app.tar.gz" "$ASSETS/Lotus.Teaching.Invoices_universal.app.tar.gz"
          cp "$BUNDLE/macos/Lotus Teaching Invoices.app.tar.gz.sig" "$ASSETS/Lotus.Teaching.Invoices_universal.app.tar.gz.sig"

          # Read the signature
          SIG=$(cat "$BUNDLE/macos/Lotus Teaching Invoices.app.tar.gz.sig")

          # Build latest.json for the updater
          cat > "$ASSETS/latest.json" <<EOF
          {
            "version": "$VERSION",
            "notes": "See the assets to download this version and install.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-universal": {
                "signature": "$SIG",
                "url": "https://github.com/damageboy/lotus-teaching-invoices/releases/download/v${VERSION}/Lotus.Teaching.Invoices_universal.app.tar.gz"
              },
              "darwin-aarch64": {
                "signature": "$SIG",
                "url": "https://github.com/damageboy/lotus-teaching-invoices/releases/download/v${VERSION}/Lotus.Teaching.Invoices_universal.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "$SIG",
                "url": "https://github.com/damageboy/lotus-teaching-invoices/releases/download/v${VERSION}/Lotus.Teaching.Invoices_universal.app.tar.gz"
              }
            }
          }
          EOF

          echo "=== Release assets ==="
          ls -la "$ASSETS/"
          echo "=== latest.json ==="
          cat "$ASSETS/latest.json"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*.dmg
            release-assets/*.app.tar.gz
            release-assets/*.app.tar.gz.sig
            release-assets/latest.json
